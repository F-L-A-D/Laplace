name: laplace-scheduler
schedule: "0 7 * * *"
timeZone: "Asia/Tokyo"

httpTarget:
  uri: https://asia-northeast1-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/gen-lang-client-0262945179/jobs/laplace-job:run
  httpMethod: POST

  oauthToken:
    serviceAccountEmail: 913536369768-compute@developer.gserviceaccount.com
    scope: https://www.googleapis.com/auth/cloud-platform

  headers:
    User-Agent: Google-Cloud-Scheduler

retryConfig:
  minBackoffDuration: 5s
  maxBackoffDuration: 3600s
  maxDoublings: 5
  maxRetryDuration: 0s

attemptDeadline: 180s